name: Feature Request
description: Suggest a new feature for Get Things Done
labels: [enhancement]
body:
  - type: dropdown
    id: mode
    attributes:
      label: Which mode does this relate to?
      options:
        - Forward (idea → code)
        - Backward (code → docs)
        - Sync (drift detection)
        - Installer / Runtime
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like GTD to do?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would you use this feature?
